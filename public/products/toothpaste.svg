<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#a5d6a7"/>
    </linearGradient>
    <linearGradient id="tube" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#bdbdbd"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <circle cx="70" cy="70" r="35" fill="#4caf50" opacity="0.06"/>
  <g filter="url(#shadow)" transform="rotate(-10,200,200)">
    <!-- Tube body -->
    <rect x="120" y="140" width="160" height="150" rx="10" fill="url(#tube)"/>
    <!-- Tube bottom crimp -->
    <rect x="130" y="280" width="140" height="12" rx="2" fill="#bdbdbd"/>
    <line x1="140" y1="286" x2="260" y2="286" stroke="#999" stroke-width="0.5"/>
    <!-- Cap -->
    <rect x="175" y="115" width="50" height="30" rx="6" fill="#1a5c2a"/>
    <rect x="185" y="108" width="30" height="14" rx="5" fill="#2d8a3e"/>
    <!-- Nozzle -->
    <path d="M190,140 L190,145 L210,145 L210,140" fill="#1a5c2a"/>
    <!-- Label stripe -->
    <rect x="120" y="170" width="160" height="8" fill="#1a5c2a"/>
    <rect x="120" y="250" width="160" height="4" fill="#c9a84c"/>
    <!-- Label text -->
    <text x="200" y="205" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-weight="bold" fill="#1a5c2a">PANCHGAVYA</text>
    <text x="200" y="225" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#c9a84c">Toothpaste</text>
    <text x="200" y="243" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">Neem + Clove + Babool | 100g</text>
  </g>
  <!-- Mint leaves -->
  <g opacity="0.35">
    <path d="M310,160 C300,145 305,128 320,132 C330,136 328,155 310,160Z" fill="#2e7d32"/>
    <path d="M315,158 C308,148 312,138 320,140" stroke="#1a5c2a" stroke-width="0.5" fill="none"/>
    <path d="M325,170 C320,160 325,150 335,153 C342,156 338,168 325,170Z" fill="#4caf50"/>
  </g>
  <!-- Tooth icon -->
  <g transform="translate(85,250)" opacity="0.15">
    <path d="M0,-15 C-8,-15 -15,-8 -15,2 C-15,12 -8,25 -5,25 C-2,25 -3,15 0,15 C3,15 2,25 5,25 C8,25 15,12 15,2 C15,-8 8,-15 0,-15Z" fill="#1a5c2a"/>
  </g>
  <text x="200" y="350" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#1a5c2a">Panchgavya Toothpaste</text>
  <text x="200" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#c9a84c" letter-spacing="2">MEGHA'S PANCHGAVYA</text>
</svg>
