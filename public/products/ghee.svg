<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9e7"/>
      <stop offset="100%" stop-color="#f9e8a0"/>
    </linearGradient>
    <linearGradient id="jar" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5deb3"/>
      <stop offset="50%" stop-color="#e8c95a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="gheeGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="lid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a5c2a"/>
      <stop offset="100%" stop-color="#0f3d1a"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="80" fill="#c9a84c" opacity="0.06"/>
  <circle cx="350" cy="350" r="100" fill="#c9a84c" opacity="0.06"/>
  <!-- Jar body -->
  <g filter="url(#shadow)">
    <path d="M130,160 L130,280 Q130,310 160,310 L240,310 Q270,310 270,280 L270,160 Z" fill="url(#jar)"/>
    <!-- Ghee inside (visible at top) -->
    <ellipse cx="200" cy="165" rx="70" ry="15" fill="url(#gheeGold)"/>
    <!-- Jar neck -->
    <rect x="150" y="130" width="100" height="35" rx="4" fill="#e8d5a0"/>
    <!-- Lid -->
    <rect x="140" y="110" width="120" height="28" rx="10" fill="url(#lid)"/>
    <rect x="175" y="105" width="50" height="10" rx="5" fill="#2d8a3e"/>
    <!-- Jar label area -->
    <rect x="148" y="195" width="104" height="80" rx="8" fill="white" opacity="0.9"/>
    <!-- Label cow icon -->
    <circle cx="200" cy="220" r="15" fill="#1a5c2a" opacity="0.1"/>
    <text x="200" y="225" text-anchor="middle" font-size="16" fill="#1a5c2a">🐄</text>
    <!-- Label text -->
    <text x="200" y="248" text-anchor="middle" font-family="Georgia,serif" font-size="10" font-weight="bold" fill="#1a5c2a">PURE A2</text>
    <text x="200" y="262" text-anchor="middle" font-family="Georgia,serif" font-size="11" font-weight="bold" fill="#c9a84c">BILONA GHEE</text>
    <!-- Jar shine -->
    <rect x="145" y="165" width="12" height="60" rx="6" fill="white" opacity="0.25"/>
  </g>
  <!-- Golden drops -->
  <circle cx="140" cy="90" r="5" fill="#e8c95a" opacity="0.5"/>
  <circle cx="270" cy="100" r="3" fill="#e8c95a" opacity="0.4"/>
  <circle cx="110" cy="300" r="4" fill="#e8c95a" opacity="0.3"/>
  <!-- Leaf decorations -->
  <path d="M305,180 C320,165 340,170 335,190 C330,205 310,200 305,180Z" fill="#1a5c2a" opacity="0.3"/>
  <path d="M80,250 C65,235 70,215 90,220 C105,225 100,245 80,250Z" fill="#1a5c2a" opacity="0.25"/>
  <!-- Product name -->
  <text x="200" y="355" text-anchor="middle" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#1a5c2a">Panchgavya Ghee</text>
  <text x="200" y="375" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#c9a84c" letter-spacing="2">MEGHA'S PANCHGAVYA</text>
</svg>
