    <rect x="5" y="5" width="50" height="30" rx="3" fill="white" opacity="0.9"/>
    <text x="30" y="18" text-anchor="middle" font-family="Georgia,serif" font-size="6" font-weight="bold" fill="#1a5c2a">COW DUNG</text>
    <text x="30" y="28" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-weight="bold" fill="#c9a84c">DHOOP</text>
