    <path d="M200,108 C208,88 195,75 205,55 C215,35 200,20 208,5" stroke="#bdbdbd" stroke-width="2" fill="none" opacity="0.3"/>
  </g>
  <rect x="160" y="180" width="3" height="95" rx="1.5" fill="#795548" opacity="0.4" transform="rotate(-15,161,280)"/>
  <rect x="237" y="180" width="3" height="95" rx="1.5" fill="#795548" opacity="0.4" transform="rotate(15,238,280)"/>
  <g transform="translate(295,200)" filter="url(#shadow)">
