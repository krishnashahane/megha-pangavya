<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="stick" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="50%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#5d4037"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <circle cx="300" cy="60" r="40" fill="#ff9800" opacity="0.08"/>
  <g filter="url(#shadow)">
    <ellipse cx="200" cy="295" rx="50" ry="12" fill="#8d6e63"/>
    <rect x="170" y="270" width="60" height="28" rx="4" fill="#a1887f"/>
    <rect x="180" y="260" width="40" height="15" rx="4" fill="#8d6e63"/>
    <circle cx="200" cy="268" r="4" fill="#5d4037"/>
  </g>
  <rect x="198" y="120" width="4" height="150" rx="2" fill="url(#stick)"/>
  <circle cx="200" cy="118" r="5" fill="#ff6f00"/>
  <circle cx="200" cy="118" r="3" fill="#ff8f00"/>
  <circle cx="200" cy="116" r="2" fill="#ffcc02"/>
  <g filter="url(#blur)" opacity="0.5">
