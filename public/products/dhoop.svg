    <text x="30" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#c9a84c">30 Sticks</text>
  </g>
  <text x="80" y="120" text-anchor="middle" font-size="28" fill="#ff9800" opacity="0.12">ॐ</text>
  <text x="200" y="350" text-anchor="middle" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#5d4037">Cow Dung Dhoop Sticks</text>
  <text x="200" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#c9a84c" letter-spacing="2">MEGHA'S PANCHGAVYA</text>
