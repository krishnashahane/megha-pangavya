    <g transform="translate(600,100)"><circle r="28" fill="white" stroke="#c9a84c" stroke-width="1.5"/><text y="8">💪</text></g>
    <g transform="translate(200,260)"><circle r="28" fill="white" stroke="#c9a84c" stroke-width="1.5"/><text y="8">🦴</text></g>
    <g transform="translate(600,260)"><circle r="28" fill="white" stroke="#c9a84c" stroke-width="1.5"/><text y="8">✨</text></g>
    <g transform="translate(400,270)"><circle r="28" fill="white" stroke="#c9a84c" stroke-width="1.5"/><text y="8">🛡️</text></g>
  </g>
  <!-- Connecting lines -->
  <g stroke="#c9a84c" stroke-width="1" opacity="0.3" stroke-dasharray="4,4">
    <line x1="230" y1="115" x2="365" y2="140"/>
    <line x1="570" y1="115" x2="435" y2="140"/>
    <line x1="230" y1="245" x2="365" y2="200"/>
    <line x1="570" y1="245" x2="435" y2="200"/>
  </g>
  <text x="400" y="340" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="#1a5c2a">5 Amazing Benefits of A2 Ghee</text>
  <text x="400" y="375" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#c9a84c" letter-spacing="3">MEGHA'S PANCHGAVYA</text>
