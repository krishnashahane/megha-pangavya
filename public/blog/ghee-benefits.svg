<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef9e7"/>
      <stop offset="100%" stop-color="#f9e8a0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <circle cx="400" cy="200" r="120" fill="#c9a84c" opacity="0.08"/>
  <!-- Ghee jar center -->
  <g transform="translate(400,140)">
    <rect x="-35" y="-30" width="70" height="80" rx="10" fill="#e8c95a" stroke="#c9a84c" stroke-width="2"/>
    <rect x="-25" y="-45" width="50" height="18" rx="6" fill="#1a5c2a"/>
    <ellipse cx="0" cy="-27" rx="30" ry="6" fill="#ffe066"/>
    <text text-anchor="middle" y="15" font-size="10" fill="#8b7355" font-family="Georgia,serif" font-weight="bold">A2</text>
    <text text-anchor="middle" y="30" font-size="8" fill="#8b7355" font-family="Georgia,serif">GHEE</text>
  </g>
  <!-- Benefit icons around -->
