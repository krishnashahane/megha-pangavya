<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a5c2a"/>
      <stop offset="100%" stop-color="#0d3d16"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Subtle pattern -->
  <g opacity="0.05" fill="white">
    <circle cx="100" cy="100" r="60"/><circle cx="300" cy="50" r="40"/>
    <circle cx="700" cy="350" r="80"/><circle cx="500" cy="300" r="50"/>
  </g>
  <!-- 5 sacred products icons -->
  <g transform="translate(80,150)">
    <circle r="35" fill="white" opacity="0.15"/><text text-anchor="middle" y="8" font-size="28">🥛</text>
    <text text-anchor="middle" y="55" font-size="11" fill="#c9a84c" font-family="Georgia,serif">Milk</text>
  </g>
  <g transform="translate(220,150)">
    <circle r="35" fill="white" opacity="0.15"/><text text-anchor="middle" y="8" font-size="28">🥣</text>
    <text text-anchor="middle" y="55" font-size="11" fill="#c9a84c" font-family="Georgia,serif">Curd</text>
  </g>
  <g transform="translate(360,150)">
    <circle r="35" fill="white" opacity="0.15"/><text text-anchor="middle" y="8" font-size="28">🧈</text>
    <text text-anchor="middle" y="55" font-size="11" fill="#c9a84c" font-family="Georgia,serif">Ghee</text>
  </g>
  <g transform="translate(500,150)">
    <circle r="35" fill="white" opacity="0.15"/><text text-anchor="middle" y="8" font-size="28">💧</text>
    <text text-anchor="middle" y="55" font-size="11" fill="#c9a84c" font-family="Georgia,serif">Gomutra</text>
  </g>
  <g transform="translate(640,150)">
    <circle r="35" fill="white" opacity="0.15"/><text text-anchor="middle" y="8" font-size="28">🟤</text>
    <text text-anchor="middle" y="55" font-size="11" fill="#c9a84c" font-family="Georgia,serif">Gobar</text>
  </g>
  <!-- Title -->
  <text x="400" y="290" text-anchor="middle" font-family="Georgia,serif" font-size="32" font-weight="bold" fill="white">What is Panchgavya?</text>
  <text x="400" y="325" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#c9a84c">The Sacred Five Products of the Cow</text>
  <!-- Brand -->
  <text x="400" y="375" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white" opacity="0.5" letter-spacing="3">MEGHA'S PANCHGAVYA</text>
</svg>
