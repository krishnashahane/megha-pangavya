<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- DNA helix left side (science) -->
  <g stroke="#1a5c2a" stroke-width="2" fill="none" opacity="0.2">
    <path d="M120,50 C160,80 160,120 120,150 C80,180 80,220 120,250 C160,280 160,320 120,350"/>
    <path d="M180,50 C140,80 140,120 180,150 C220,180 220,220 180,250 C140,280 140,320 180,350"/>
    <line x1="135" y1="65" x2="165" y2="65"/><line x1="120" y1="100" x2="180" y2="100"/>
    <line x1="135" y1="135" x2="165" y2="135"/><line x1="120" y1="200" x2="180" y2="200"/>
    <line x1="135" y1="235" x2="165" y2="235"/><line x1="120" y1="300" x2="180" y2="300"/>
  </g>
  <!-- Flask (right side) -->
  <g transform="translate(650,120)" opacity="0.25">
    <rect x="-10" y="-40" width="20" height="30" rx="3" fill="none" stroke="#1a5c2a" stroke-width="2.5"/>
    <path d="M-25,0 L-10,-10 L-10,-10 L10,-10 L25,0 L25,50 Q25,70 0,70 Q-25,70 -25,50 Z" fill="none" stroke="#1a5c2a" stroke-width="2.5"/>
    <ellipse cx="0" cy="45" rx="18" ry="12" fill="#c9a84c" opacity="0.4"/>
  </g>
  <!-- Cow silhouette (center, traditional) -->
  <g transform="translate(400,130)" opacity="0.15">
    <path d="M-50,20 C-50,0 -40,-20 -25,-28 C-10,-36 5,-38 20,-35 C35,-32 50,-22 60,-12 C70,-2 75,15 75,30 C75,42 70,50 60,55 L-35,55 C-45,50 -50,42 -50,30Z" fill="#1a5c2a"/>
    <path d="M-50,15 C-60,5 -70,-10 -75,-25 C-78,-32 -72,-40 -65,-42 C-58,-44 -50,-35 -48,-25 C-46,-15 -48,0 -50,15Z" fill="#1a5c2a"/>
  </g>
  <!-- Molecule dots -->
  <g fill="#1a5c2a" opacity="0.12">
    <circle cx="350" cy="80" r="8"/><circle cx="380" cy="60" r="5"/>
    <circle cx="420" cy="75" r="6"/><circle cx="450" cy="55" r="4"/>
    <line x1="355" y1="77" x2="377" y2="63" stroke="#1a5c2a" stroke-width="1.5"/>
    <line x1="383" y1="62" x2="416" y2="73" stroke="#1a5c2a" stroke-width="1.5"/>
  </g>
  <text x="400" y="280" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="#1a5c2a">The Science Behind Gomutra</text>
  <text x="400" y="315" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#666">Ancient Wisdom Meets Modern Research</text>
  <text x="400" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#c9a84c" letter-spacing="3">MEGHA'S PANCHGAVYA</text>
</svg>
