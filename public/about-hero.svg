<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="cowBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0e0"/>
      <stop offset="100%" stop-color="#e8dcc8"/>
    </linearGradient>
    <filter id="softShadow"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.1"/></filter>
  </defs>
  <!-- Background -->
  <rect width="600" height="450" rx="20" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="480" cy="70" r="45" fill="#c9a84c" opacity="0.2"/>
  <circle cx="480" cy="70" r="30" fill="#c9a84c" opacity="0.15"/>
  <!-- Hills -->
  <ellipse cx="150" cy="280" rx="200" ry="60" fill="#66bb6a" opacity="0.3"/>
  <ellipse cx="450" cy="290" rx="220" ry="50" fill="#4caf50" opacity="0.25"/>
  <!-- Ground -->
  <rect x="0" y="280" width="600" height="170" rx="0" fill="url(#grass)" opacity="0.4"/>
  <!-- Gaushala / simple structure -->
  <g filter="url(#softShadow)">
    <rect x="60" y="180" width="140" height="100" rx="4" fill="#d7ccc8"/>
    <polygon points="50,180 130,130 210,180" fill="#8d6e63"/>
    <rect x="100" y="220" width="35" height="60" rx="3" fill="#795548"/>
    <rect x="160" y="210" width="25" height="25" rx="2" fill="#b3e5fc" opacity="0.7"/>
    <!-- Flag on top -->
    <line x1="130" y1="130" x2="130" y2="105" stroke="#795548" stroke-width="2"/>
    <polygon points="130,105 155,112 130,120" fill="#ff9800" opacity="0.8"/>
  </g>
  <!-- Desi Cow (center, main focus) -->
  <g transform="translate(320,220)" filter="url(#softShadow)">
    <!-- Body -->
    <ellipse cx="0" cy="20" rx="55" ry="35" fill="url(#cowBody)"/>
    <!-- Head -->
    <ellipse cx="-50" cy="-5" rx="22" ry="18" fill="url(#cowBody)"/>
    <!-- Snout -->
    <ellipse cx="-65" cy="2" rx="10" ry="8" fill="#f5e6d0"/>
    <!-- Eye -->
    <circle cx="-48" cy="-10" r="3" fill="#3e2723"/>
    <circle cx="-47" cy="-11" r="1" fill="white"/>
    <!-- Ears -->
    <ellipse cx="-38" cy="-20" rx="8" ry="5" fill="#e8dcc8" transform="rotate(-20,-38,-20)"/>
    <ellipse cx="-55" cy="-22" rx="8" ry="5" fill="#e8dcc8" transform="rotate(15,-55,-22)"/>
    <!-- Horns -->
    <path d="M-42,-22 C-38,-38 -30,-40 -25,-35" stroke="#c9a84c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-52,-23 C-56,-38 -65,-38 -68,-32" stroke="#c9a84c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Hump -->
    <ellipse cx="-15" cy="-20" rx="18" ry="14" fill="#ede0c8"/>
    <!-- Legs -->
    <rect x="-30" y="45" width="8" height="35" rx="3" fill="#e0d4be"/>
    <rect x="-10" y="45" width="8" height="35" rx="3" fill="#e0d4be"/>
    <rect x="15" y="45" width="8" height="35" rx="3" fill="#e0d4be"/>
    <rect x="35" y="45" width="8" height="35" rx="3" fill="#e0d4be"/>
    <!-- Hooves -->
    <rect x="-31" y="76" width="10" height="6" rx="2" fill="#795548"/>
    <rect x="-11" y="76" width="10" height="6" rx="2" fill="#795548"/>
    <rect x="14" y="76" width="10" height="6" rx="2" fill="#795548"/>
    <rect x="34" y="76" width="10" height="6" rx="2" fill="#795548"/>
    <!-- Tail -->
    <path d="M52,15 C65,10 70,25 65,35 C63,40 58,42 55,38" stroke="#c9a84c" stroke-width="2.5" fill="none"/>
    <ellipse cx="55" cy="40" rx="4" ry="6" fill="#c9a84c" opacity="0.5"/>
    <!-- Udder -->
    <ellipse cx="5" cy="50" rx="12" ry="6" fill="#f8bbd0" opacity="0.5"/>
    <!-- Spots on body -->
    <ellipse cx="10" cy="10" rx="12" ry="8" fill="#c9a84c" opacity="0.12"/>
    <ellipse cx="-20" cy="25" rx="8" ry="6" fill="#c9a84c" opacity="0.1"/>
  </g>
  <!-- Small calf -->
  <g transform="translate(420,270) scale(0.5)" filter="url(#softShadow)">
    <ellipse cx="0" cy="10" rx="30" ry="20" fill="#f5f0e0"/>
    <ellipse cx="-28" cy="0" rx="14" ry="11" fill="#f5f0e0"/>
    <circle cx="-28" cy="-5" r="2" fill="#3e2723"/>
    <rect x="-15" y="25" width="5" height="22" rx="2" fill="#e0d4be"/>
    <rect x="-3" y="25" width="5" height="22" rx="2" fill="#e0d4be"/>
    <rect x="8" y="25" width="5" height="22" rx="2" fill="#e0d4be"/>
    <rect x="18" y="25" width="5" height="22" rx="2" fill="#e0d4be"/>
  </g>
  <!-- Trees -->
  <g transform="translate(520,200)">
    <rect x="-4" y="0" width="8" height="40" rx="2" fill="#795548"/>
    <circle cx="0" cy="-10" r="22" fill="#2e7d32" opacity="0.5"/>
    <circle cx="-10" cy="0" r="18" fill="#388e3c" opacity="0.4"/>
    <circle cx="10" cy="-5" r="16" fill="#4caf50" opacity="0.4"/>
  </g>
  <!-- Birds -->
  <g stroke="#555" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M100,80 C105,75 110,75 115,80"/><path d="M115,80 C120,75 125,75 130,80"/>
    <path d="M200,60 C204,56 208,56 212,60"/><path d="M212,60 C216,56 220,56 224,60"/>
  </g>
  <!-- Flowers in grass -->
  <g opacity="0.5">
    <circle cx="80" cy="340" r="3" fill="#ff9800"/><circle cx="180" cy="350" r="2.5" fill="#f44336"/>
    <circle cx="350" cy="360" r="3" fill="#ff9800"/><circle cx="500" cy="345" r="2.5" fill="#e91e63"/>
    <circle cx="440" cy="370" r="2" fill="#ffc107"/>
  </g>
  <!-- 5 panchgavya product circles at bottom -->
  <g transform="translate(300,415)">
    <g transform="translate(-180,0)"><circle r="16" fill="white" stroke="#c9a84c" stroke-width="1.5"/><text text-anchor="middle" y="5" font-size="14">🥛</text></g>
    <g transform="translate(-90,0)"><circle r="16" fill="white" stroke="#c9a84c" stroke-width="1.5"/><text text-anchor="middle" y="5" font-size="14">🥣</text></g>
    <g transform="translate(0,0)"><circle r="16" fill="white" stroke="#c9a84c" stroke-width="1.5"/><text text-anchor="middle" y="5" font-size="14">🧈</text></g>
    <g transform="translate(90,0)"><circle r="16" fill="white" stroke="#c9a84c" stroke-width="1.5"/><text text-anchor="middle" y="5" font-size="14">💧</text></g>
    <g transform="translate(180,0)"><circle r="16" fill="white" stroke="#c9a84c" stroke-width="1.5"/><text text-anchor="middle" y="5" font-size="14">🌿</text></g>
  </g>
</svg>
